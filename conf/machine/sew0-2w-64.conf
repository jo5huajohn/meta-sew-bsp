require conf/machine/raspberrypi0-2w-64.conf

MACHINE_FEATURES += "usbhost wifi"

PREFERRED_PROVIDER_virtual/kernel ?= "linux-raspberrypi"
PREFERRED_VERSION_linux-raspberrypi = "6.18%"

DISABLE_SPLASH = "1"

DISABLE_RPI_BOOT_LOGO = "1"

ENABLE_UART = "1"

RPI_USE_U_BOOT = "1"

ENABLE_DWC2_HOST = "1"
